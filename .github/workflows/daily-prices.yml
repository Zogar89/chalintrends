name: Daily prices

on:
  schedule:
    # 07:00, 10:00, 14:00, 18:00 America/Argentina/Buenos_Aires
    - cron: "0 10,13,17,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
      - name: Run tests before updating data
        run: python -m pytest
      - name: Update prices
        run: python scripts/update_prices.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv
          git diff --cached --quiet || git commit -m "data: update daily Chalin prices"
          git push
